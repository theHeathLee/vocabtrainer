      <button class="btn btn-secondary" id="btnClear">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M5 6l1 14h12l1-14"></path></svg>
        Clear
      </button>
    </div>

    <!-- Rating buttons (shown after checking) -->
    <div class="bottom-actions rating-actions" id="nextActions" style="display:none;">
      <button class="btn btn-rating btn-again" data-rating="again">
        <span class="rating-label">Again</span>
        <span class="rating-time">&lt;1min</span>
      </button>
      <button class="btn btn-rating btn-hard" data-rating="hard">
        <span class="rating-label">Hard</span>
        <span class="rating-time">&lt;6min</span>
      </button>
      <button class="btn btn-rating btn-good" data-rating="good">
        <span class="rating-label">Good</span>
        <span class="rating-time">&lt;10min</span>
      </button>
      <button class="btn btn-rating btn-easy" data-rating="easy">
        <span class="rating-label">Easy</span>
        <span class="rating-time">3 days</span>
      </button>
    </div>
  </main>

  <!-- Stats Modal -->
  <div class="modal-overlay" id="statsModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Statistics</h2>
        <button class="btn-icon" id="btnCloseStats">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div class="modal-body" id="statsBody">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

  <!-- File Picker Dropdown -->
  <div class="file-picker-overlay" id="filePickerOverlay">
    <div class="file-picker-dropdown" id="filePickerDropdown">
      <h3>Vocabulary Files</h3>
      <div id="filePickerList">
        <!-- Populated by JS -->
      </div>
      <div class="file-picker-import" id="filePickerImportBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Import .txt file
      </div>
      <input type="file" id="vocabFileInput" accept=".txt" style="display:none;">
    </div>
  </div>

  <script>
    // =========================================================================
    // VOCABULARY DATA - loaded from external file or IndexedDB
    // The user sees an English word/phrase and writes the Polish translation.
    // Polish special characters: ą ć ę ł ń ó ś ź ż
    // =========================================================================
    let VOCABULARY = [];

    // ---- Multi-file support: globals & helpers ----
    const DEFAULT_VOCAB_FILE = 'pol_ lesson 1 + 2.txt';
    const FILES_REGISTRY_KEY = 'anki_scribe_files';      // JSON array of {slug, name}
    const ACTIVE_FILE_KEY = 'anki_scribe_active_file';    // slug of last-used file
    let activeFileSlug = '';                               // current active file slug

    // Sanitize a filename into a safe slug for use as storage key prefix
    function slugify(filename) {
      return filename
        .replace(/\.[^.]+$/, '')          // strip extension
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '_')      // non-alphanumeric -> underscore
        .replace(/^_+|_+$/g, '');          // trim leading/trailing underscores
    }

    // ---- File registry (localStorage) ----
    function getFileRegistry() {
      try {
        const raw = localStorage.getItem(FILES_REGISTRY_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch { return []; }
    }

    function saveFileRegistry(files) {
      localStorage.setItem(FILES_REGISTRY_KEY, JSON.stringify(files));
    }

    function registerFile(slug, displayName) {
      const files = getFileRegistry();
      if (!files.find(f => f.slug === slug)) {
        files.push({ slug, name: displayName });
        saveFileRegistry(files);
      }
    }

    function unregisterFile(slug) {
      const files = getFileRegistry().filter(f => f.slug !== slug);
      saveFileRegistry(files);
    }

    function getActiveFileSlug() {
      return localStorage.getItem(ACTIVE_FILE_KEY) || '';
    }

    function setActiveFileSlug(slug) {
      localStorage.setItem(ACTIVE_FILE_KEY, slug);
      activeFileSlug = slug;
    }

    // ---- IndexedDB vocab store ----
    const VOCAB_DB_NAME = 'anki_scribe_vocab';
    const VOCAB_DB_VERSION = 1;
    const VOCAB_STORE_NAME = 'files';

    function openVocabDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(VOCAB_DB_NAME, VOCAB_DB_VERSION);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(VOCAB_STORE_NAME)) {
            db.createObjectStore(VOCAB_STORE_NAME, { keyPath: 'slug' });
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function storeVocabFile(slug, displayName, textContent) {
      const db = await openVocabDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(VOCAB_STORE_NAME, 'readwrite');
        tx.objectStore(VOCAB_STORE_NAME).put({ slug, name: displayName, text: textContent });
        tx.oncomplete = () => { registerFile(slug, displayName); resolve(); };
        tx.onerror = () => reject(tx.error);
      });
    }

    async function loadVocabFile(slug) {
      const db = await openVocabDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(VOCAB_STORE_NAME, 'readonly');
        const req = tx.objectStore(VOCAB_STORE_NAME).get(slug);
        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => reject(req.error);
      });
    }

    async function deleteVocabFile(slug) {
      const db = await openVocabDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(VOCAB_STORE_NAME, 'readwrite');
        tx.objectStore(VOCAB_STORE_NAME).delete(slug);
        tx.oncomplete = () => { unregisterFile(slug); resolve(); };
        tx.onerror = () => reject(tx.error);
      });
    }

    // ---- Parse vocabulary text into array (pure function, no side effects) ----
    function parseVocabularyText(text) {
      const lines = text.split('\n');
      const vocab = [];
      let idCounter = 1;

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || trimmed.startsWith('#')) continue;

        const parts = trimmed.split('\t');
        if (parts.length < 2) continue;

        const prompt = decodeHTML(parts[0].trim());
        const answerRaw = decodeHTML(parts[1].trim());
        const answerClean = answerRaw.replace(/\s*\([^)]*\)\s*$/, '').trim();

        vocab.push({
          id: 'v' + idCounter++,
          prompt: prompt,
          answer: answerClean,
          answerDisplay: answerRaw
        });
      }
      return vocab;
    }

    // Fetch the default vocab file from the server, store it in IndexedDB, and return parsed vocab
    async function fetchAndStoreDefaultVocab() {
      const response = await fetch(DEFAULT_VOCAB_FILE);
      const text = await response.text();
      const slug = slugify(DEFAULT_VOCAB_FILE);
      const displayName = DEFAULT_VOCAB_FILE.replace(/\.[^.]+$/, '');
      await storeVocabFile(slug, displayName, text);
      return { slug, displayName, vocab: parseVocabularyText(text) };
    }

    // Load vocabulary for a given slug from IndexedDB, parse, and set as active
    async function loadVocabularyForSlug(slug) {
      const record = await loadVocabFile(slug);
      if (!record) return null;
      const vocab = parseVocabularyText(record.text);
      return { slug: record.slug, displayName: record.name, vocab };
    }

    // Switch to a different vocabulary file: set active, reload vocab, resolve batch
    async function switchVocabFile(slug) {
      const result = await loadVocabularyForSlug(slug);
      if (!result) return false;
      VOCABULARY = result.vocab;
      setActiveFileSlug(slug);
      resolveBatch();
      updateBatchIndicator();
      updateProgressRing();
      updateFilePickerLabel();
      lastCheckResult = null;
      const vocab = pickNextVocab();
      showVocab(vocab);
      return true;
    }

    // Decode HTML entities (e.g. &#x27; -> ')
    function decodeHTML(str) {
      const el = document.createElement('textarea');
      el.innerHTML = str;
      return el.value;
    }

    // Update the prompt label to show abbreviated active file name
    function updateFilePickerLabel() {
      const el = document.getElementById('promptLabel');
      if (!el) return;
      const files = getFileRegistry();
      const file = files.find(f => f.slug === activeFileSlug);
      // Show short name: first 12 chars of display name, or "PL" fallback
      const name = file ? file.name : 'PL';
      // Abbreviate: take first ~12 chars
      el.textContent = name.length > 14 ? name.substring(0, 12) + '..' : name;
      el.title = name;
    }

    // =========================================================================
    // STATS STORAGE
    // =========================================================================
    // Per-file storage key helpers
    function getStorageKey() { return 'anki_scribe_stats_' + activeFileSlug; }
    function getBatchKey()   { return 'anki_scribe_batch_' + activeFileSlug; }
    function getBatchSizeKey() { return 'anki_scribe_batch_size_' + activeFileSlug; }

    // Migrate legacy (pre-multi-file) stats to a per-file key on first run
    function migrateLegacyStats(slug) {
      const legacyStats = localStorage.getItem('anki_scribe_stats');
      const legacyBatch = localStorage.getItem('anki_scribe_batch');
      const legacyBatchSize = localStorage.getItem('anki_scribe_batch_size');
      const newStatsKey = 'anki_scribe_stats_' + slug;
      // Only migrate if new key doesn't exist yet and legacy data is present
      if (!localStorage.getItem(newStatsKey) && legacyStats) {
        localStorage.setItem(newStatsKey, legacyStats);
        if (legacyBatch) localStorage.setItem('anki_scribe_batch_' + slug, legacyBatch);
        if (legacyBatchSize) localStorage.setItem('anki_scribe_batch_size_' + slug, legacyBatchSize);
        // Remove legacy keys after successful migration
        localStorage.removeItem('anki_scribe_stats');
        localStorage.removeItem('anki_scribe_batch');
        localStorage.removeItem('anki_scribe_batch_size');
      }
    }

    // Rating intervals in milliseconds
    const RATING_INTERVALS = {
      again: 1 * 60 * 1000,         // 1 minute
      hard:  6 * 60 * 1000,         // 6 minutes
      good:  10 * 60 * 1000,        // 10 minutes
      easy:  3 * 24 * 60 * 60 * 1000 // 3 days
    };

    function loadStats() {
      try {
        const raw = localStorage.getItem(getStorageKey());
        return raw ? JSON.parse(raw) : {};
      } catch {
        return {};
      }
    }

    function saveStats(stats) {
      localStorage.setItem(getStorageKey(), JSON.stringify(stats));
    }

    function recordAttempt(vocabId, rating) {
      const stats = loadStats();
      if (!stats[vocabId]) {
        stats[vocabId] = { attempts: 0, correct: 0, wrong: 0, again: 0, hard: 0, good: 0, easy: 0, history: [] };
      }
      const s = stats[vocabId];
      s.attempts++;
      // Maintain backward compat: again/hard = wrong, good/easy = correct
      if (rating === "again" || rating === "hard") {
        s.wrong++;
      } else {
        s.correct++;
      }
      // Track individual rating counts
      s[rating] = (s[rating] || 0) + 1;
      // Store due time based on rating interval
      s.dueAt = Date.now() + RATING_INTERVALS[rating];
      s.history.push({
        timestamp: Date.now(),
        correct: rating === "good" || rating === "easy",
        rating: rating
      });
      saveStats(stats);
    }

    function clearStats() {
      localStorage.removeItem(getStorageKey());
    }

    // Export all learning data as a JSON file download
    function exportStats() {
      const data = {
        version: 2,
        exportedAt: new Date().toISOString(),
        activeFile: activeFileSlug,
        files: getFileRegistry(),
        stats: loadStats(),
        batch: loadBatch(),
        batchSize: getBatchSize()
      };
      const json = JSON.stringify(data, null, 2);
      const blob = new Blob([json], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const dateStr = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = `anki-scribe-backup-${dateStr}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // Import learning data from a JSON file
    // mode: "replace" overwrites everything, "merge" keeps the better stats per word
    function importStats(file, mode) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = JSON.parse(e.target.result);
            // Validate structure
            if (!data || typeof data.stats !== "object") {
              reject("Invalid backup file: missing stats data.");
              return;
            }

            if (mode === "replace") {
              // Full replace: overwrite stats, batch, and batch size
              saveStats(data.stats);
              if (data.batch && Array.isArray(data.batch)) {
                saveBatch(data.batch);
              }
              if (data.batchSize && typeof data.batchSize === "number") {
                setBatchSize(data.batchSize);
              }
            } else {
              // Merge: for each word, keep whichever has more attempts.
              const current = loadStats();
              const incoming = data.stats;
              for (const id of Object.keys(incoming)) {
                const inc = incoming[id];
                const cur = current[id];
                if (!cur || (inc.attempts || 0) > (cur.attempts || 0)) {
                  current[id] = inc;
                }
              }
              saveStats(current);
            }

            // Refresh batch and UI
            resolveBatch();
            updateBatchIndicator();
            updateProgressRing();

            const wordCount = Object.keys(data.stats).length;
            resolve(wordCount);
          } catch (err) {
            reject("Failed to parse backup file: " + err.message);
          }
        };
        reader.onerror = () => reject("Failed to read file.");
        reader.readAsText(file);
      });
    }

    // =========================================================================
    // BATCH SYSTEM
    // Limits active vocabulary to a small subset (batch) for focused learning.
    // The batch is persisted in localStorage and only changes when the user
    // explicitly skips it or all words are learned.
    // =========================================================================
    const DEFAULT_BATCH_SIZE = 20;

    let currentBatch = []; // array of vocab objects in the current batch

    function getBatchSize() {
      try {
        const v = parseInt(localStorage.getItem(getBatchSizeKey()));
        return (v && v > 0) ? v : DEFAULT_BATCH_SIZE;
      } catch {
        return DEFAULT_BATCH_SIZE;
      }
    }

    function setBatchSize(size) {
      const s = Math.max(1, Math.min(size, VOCABULARY.length || 999));
      localStorage.setItem(getBatchSizeKey(), s);
      return s;
    }

    function loadBatch() {
      try {
        const raw = localStorage.getItem(getBatchKey());
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }

    function saveBatch(batchIds) {
      localStorage.setItem(getBatchKey(), JSON.stringify(batchIds));
    }

    // Pick a new random batch of N words from the full vocabulary,
    // preferring words that haven't been practiced much.
    function generateNewBatch() {
      const size = getBatchSize();
      const stats = loadStats();
      // Sort vocabulary: least practiced first, then shuffle within tiers
      const sorted = [...VOCABULARY].map(v => {
        const s = stats[v.id];
        const attempts = s ? s.attempts : 0;
        const correctRate = s && s.attempts > 0 ? s.correct / s.attempts : 0;
        return { vocab: v, attempts, correctRate, rand: Math.random() };
      });
      // Primary sort: fewer attempts first. Secondary: lower correct rate. Tertiary: random.
      sorted.sort((a, b) => {
        if (a.attempts !== b.attempts) return a.attempts - b.attempts;
        if (a.correctRate !== b.correctRate) return a.correctRate - b.correctRate;
        return a.rand - b.rand;
      });
      const picked = sorted.slice(0, Math.min(size, sorted.length));
      const batchIds = picked.map(p => p.vocab.id);
      saveBatch(batchIds);
      return batchIds;
    }

    // Resolve batch IDs to vocab objects. Returns the active batch.
    function resolveBatch() {
      let batchIds = loadBatch();
      if (!batchIds || batchIds.length === 0) {
        batchIds = generateNewBatch();
      }
      // Filter to only IDs that still exist in VOCABULARY
      const vocabMap = new Map(VOCABULARY.map(v => [v.id, v]));
      currentBatch = batchIds.map(id => vocabMap.get(id)).filter(Boolean);
      // If the batch is empty after filtering (e.g. vocab file changed), regenerate
      if (currentBatch.length === 0) {
        batchIds = generateNewBatch();
        currentBatch = batchIds.map(id => vocabMap.get(id)).filter(Boolean);
      }
      return currentBatch;
    }

    function skipCurrentBatch() {
      generateNewBatch();
      resolveBatch();
      lastCheckResult = null;
      const vocab = pickNextVocab();
      showVocab(vocab);
    }

    // Replace a single word in the current batch with a new one from outside the batch
    function skipWordInBatch(vocabId) {
      let batchIds = loadBatch() || [];
      const batchSet = new Set(batchIds);
      // Find candidates not in the current batch
      const candidates = VOCABULARY.filter(v => !batchSet.has(v.id));
      if (candidates.length === 0) return; // no replacement available
      // Pick a random replacement, preferring less-practiced words
      const stats = loadStats();
      const scored = candidates.map(v => {
        const s = stats[v.id];
        const attempts = s ? s.attempts : 0;
        return { vocab: v, score: Math.random() - attempts * 0.1 };
      });
      scored.sort((a, b) => b.score - a.score);
      const replacement = scored[0].vocab;
      // Replace the skipped word
      batchIds = batchIds.map(id => id === vocabId ? replacement.id : id);
      saveBatch(batchIds);
      resolveBatch();
    }

    function updateBatchIndicator() {
      const el = document.getElementById("batchIndicator");
      if (el) {
        el.textContent = currentBatch.length + "/" + VOCABULARY.length;
      }
    }

    // =========================================================================
    // PROGRESS TRACKING
    // Calculates mastery per word and aggregates for batch / overall display.
    // =========================================================================

    // Mastery score for a single word based on its latest rating.
    // Returns 0..100.
    const MASTERY_SCORES = { again: 10, hard: 40, good: 75, easy: 100 };

    function getWordMastery(vocabId) {
      const stats = loadStats();
      const s = stats[vocabId];
      if (!s || !s.history || s.history.length === 0) return 0; // unseen
      const lastRating = s.history[s.history.length - 1].rating;
      return MASTERY_SCORES[lastRating] || 0;
    }

    // Average mastery across the current batch (0..100)
    function calculateBatchMastery() {
      if (currentBatch.length === 0) return 0;
      const total = currentBatch.reduce((sum, v) => sum + getWordMastery(v.id), 0);
      return Math.round(total / currentBatch.length);
    }

    // Categorize ALL vocabulary into mastered / learning / unseen
    function calculateOverallProgress() {
      const stats = loadStats();
      let mastered = 0;
      let learning = 0;
      let unseen = 0;
      for (const v of VOCABULARY) {
        const s = stats[v.id];
        if (!s || !s.history || s.history.length === 0) {
          unseen++;
        } else {
          const lastRating = s.history[s.history.length - 1].rating;
          if (lastRating === "easy" || lastRating === "good") {
            mastered++;
          } else {
            learning++;
          }
        }
      }
      const totalMastery = VOCABULARY.length > 0
        ? Math.round(VOCABULARY.reduce((sum, v) => sum + getWordMastery(v.id), 0) / VOCABULARY.length)
        : 0;
      return { mastered, learning, unseen, total: VOCABULARY.length, totalMastery };
    }

    // Get gradient color for a mastery percentage (red -> amber -> green)
    function getMasteryColor(pct) {
      if (pct <= 33) {
        // red to amber: #ef4444 -> #f59e0b
        const t = pct / 33;
        const r = Math.round(239 + (245 - 239) * t);
        const g = Math.round(68 + (158 - 68) * t);
        const b = Math.round(68 + (11 - 68) * t);
        return `rgb(${r},${g},${b})`;
      } else if (pct <= 66) {
        // amber to green: #f59e0b -> #22c55e
        const t = (pct - 33) / 33;
        const r = Math.round(245 + (34 - 245) * t);
        const g = Math.round(158 + (197 - 158) * t);
        const b = Math.round(11 + (94 - 11) * t);
        return `rgb(${r},${g},${b})`;
      } else {
        // green zone
        return '#22c55e';
      }
    }

    // Update the small progress ring in the prompt bar
    function updateProgressRing() {
      const pct = calculateBatchMastery();
      const fill = document.getElementById("progressRingFill");
      const text = document.getElementById("progressRingText");
      if (!fill || !text) return;
      const circumference = 2 * Math.PI * 15; // r=15 => ~94.25
      const offset = circumference - (pct / 100) * circumference;
      fill.setAttribute("stroke-dashoffset", offset);
      fill.setAttribute("stroke", getMasteryColor(pct));
      text.textContent = pct + "%";
    }

    // Render the progress overview section for the stats modal
    function renderProgressOverview() {
      const p = calculateOverallProgress();
      const circumference = 2 * Math.PI * 34; // r=34 for the large ring
      const offset = circumference - (p.totalMastery / 100) * circumference;
      const color = getMasteryColor(p.totalMastery);
      const masteredPct = p.total > 0 ? (p.mastered / p.total * 100) : 0;
      const learningPct = p.total > 0 ? (p.learning / p.total * 100) : 0;
      const unseenPct = p.total > 0 ? (p.unseen / p.total * 100) : 0;

      return `
        <div class="progress-hero">
          <div class="progress-ring-large">
            <svg viewBox="0 0 80 80">
              <circle class="progress-ring-bg" cx="40" cy="40" r="34" />
              <circle class="progress-ring-fill" cx="40" cy="40" r="34"
                stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" stroke="${color}" />
            </svg>
            <div class="progress-ring-text">${p.totalMastery}%</div>
          </div>
          <div class="progress-categories">
            <div class="progress-cat">
              <span class="dot mastered"></span>
              <span class="cat-label">Mastered</span>
              <span class="cat-count">${p.mastered}</span>
            </div>
            <div class="progress-cat">
              <span class="dot learning"></span>
              <span class="cat-label">Learning</span>
              <span class="cat-count">${p.learning}</span>
            </div>
            <div class="progress-cat">
              <span class="dot unseen"></span>
              <span class="cat-label">Unseen</span>
              <span class="cat-count">${p.unseen}</span>
            </div>
          </div>
        </div>
        <div class="progress-segmented-bar">
          <div class="seg mastered" style="width:${masteredPct}%"></div>
          <div class="seg learning" style="width:${learningPct}%"></div>
          <div class="seg unseen" style="width:${unseenPct}%"></div>
        </div>
      `;
    }

    // =========================================================================
    // CANVAS DRAWING
    // =========================================================================
    const canvas = document.getElementById("drawCanvas");
    const ctx = canvas.getContext("2d");
    const canvasWrapper = document.getElementById("canvasWrapper");
    const placeholder = document.getElementById("canvasPlaceholder");
    let isDrawing = false;
    let hasDrawn = false;
    let lastX = 0;
    let lastY = 0;

    function resizeCanvas() {
      const rect = canvasWrapper.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      // Fill white background
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, rect.width, rect.height);
      // Draw guide lines to help users write at consistent size
      drawGuideLines(rect.width, rect.height);
      // Restore drawing settings
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.lineWidth = 8;
      ctx.strokeStyle = "#1a1a2e";
    }

    function drawGuideLines(w, h) {
      ctx.save();
      ctx.strokeStyle = "#e8ecf0";
      ctx.lineWidth = 1;
      ctx.setLineDash([6, 4]);
      // Horizontal center dashed line (baseline reference)
      const midY = Math.round(h * 0.55);
      ctx.beginPath();
      ctx.moveTo(20, midY);
      ctx.lineTo(w - 20, midY);
      ctx.stroke();
      // Upper guide (cap height)
      const topY = Math.round(h * 0.2);
      ctx.strokeStyle = "#eff1f5";
      ctx.beginPath();
      ctx.moveTo(20, topY);
      ctx.lineTo(w - 20, topY);
      ctx.stroke();
      // Lower guide (descender)
      const bottomY = Math.round(h * 0.8);
      ctx.beginPath();
      ctx.moveTo(20, bottomY);
      ctx.lineTo(w - 20, bottomY);
      ctx.stroke();
      ctx.restore();
    }

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      let clientX, clientY;
      if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }
      return {
        x: clientX - rect.left,
        y: clientY - rect.top
      };
    }

    function startDraw(e) {
      if (isShowingResult) return;
      e.preventDefault();
      isDrawing = true;
      const pos = getPos(e);
      lastX = pos.x;
      lastY = pos.y;
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
      // Draw a dot for taps
      ctx.lineTo(pos.x + 0.1, pos.y + 0.1);
      ctx.stroke();
      if (!hasDrawn) {
        hasDrawn = true;
        placeholder.classList.add("hidden");
      }
    }

    function draw(e) {
      if (!isDrawing) return;
      e.preventDefault();
      const pos = getPos(e);
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
      lastX = pos.x;
      lastY = pos.y;
    }

    function endDraw(e) {
      if (e) e.preventDefault();
      isDrawing = false;
    }

    // Prevent default touch behavior on canvas to avoid scrolling
    canvas.addEventListener("mousedown", startDraw);
    canvas.addEventListener("mousemove", draw);
    canvas.addEventListener("mouseup", endDraw);
    canvas.addEventListener("mouseleave", endDraw);
    canvas.addEventListener("touchstart", startDraw, { passive: false });
    canvas.addEventListener("touchmove", draw, { passive: false });
    canvas.addEventListener("touchend", endDraw, { passive: false });
    canvas.addEventListener("touchcancel", endDraw, { passive: false });

    function clearCanvas() {
      const rect = canvasWrapper.getBoundingClientRect();
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, rect.width, rect.height);
      drawGuideLines(rect.width, rect.height);
      // Restore drawing settings after clear
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.lineWidth = 8;
      ctx.strokeStyle = "#1a1a2e";
      hasDrawn = false;
      placeholder.classList.remove("hidden");
    }

    window.addEventListener("resize", () => {
      // Debounce resize
      clearTimeout(window._resizeTimer);
      window._resizeTimer = setTimeout(() => {
        resizeCanvas();
        hasDrawn = false;
        placeholder.classList.remove("hidden");
      }, 150);
    });

    // =========================================================================
    // TESSERACT OCR
    // =========================================================================
    let worker = null;

    async function initOCR() {
      const loadingStatus = document.getElementById("loadingStatus");
      const loadingBar = document.getElementById("loadingBar");

      loadingStatus.textContent = "Loading OCR engine...";
      loadingBar.style.width = "20%";

      worker = await Tesseract.createWorker("pol+eng", 1, {
        logger: (m) => {
          if (m.status === "recognizing text") {
            loadingBar.style.width = (20 + m.progress * 60) + "%";
          } else if (m.status === "loading language traineddata") {
            loadingStatus.textContent = "Loading language data...";
            loadingBar.style.width = (10 + m.progress * 10) + "%";
          }
        }
      });

      // Configure for single line recognition (handles single words and
      // short phrases better than SINGLE_WORD in practice)
      await worker.setParameters({
        tessedit_pageseg_mode: Tesseract.PSM.SINGLE_LINE,
      });

      loadingBar.style.width = "100%";
      loadingStatus.textContent = "Ready!";

      setTimeout(() => {
        document.getElementById("loadingOverlay").classList.add("hidden");
      }, 400);
    }

    function getCroppedCanvas() {
      // Work with actual canvas pixel buffer (which is CSS size * DPR)
      const w = canvas.width;
      const h = canvas.height;
      // Reset transform to read raw pixels
      ctx.save();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      const imgData = ctx.getImageData(0, 0, w, h);
      ctx.restore();
      const data = imgData.data;

      // Find bounding box of non-white pixels (ignore guide lines by using
      // a stricter threshold - guide lines are very light ~#e8ecf0 = rgb(232,236,240))
      let minX = w, minY = h, maxX = 0, maxY = 0;
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const i = (y * w + x) * 4;
          // Only count dark pixels (drawn strokes), not guide lines
          if (data[i] < 160 || data[i + 1] < 160 || data[i + 2] < 160) {
            minX = Math.min(minX, x);
            minY = Math.min(minY, y);
            maxX = Math.max(maxX, x);
            maxY = Math.max(maxY, y);
          }
        }
      }

      if (minX >= maxX || minY >= maxY) return null; // Nothing drawn

      // Add generous padding (scaled by DPR)
      const dpr = window.devicePixelRatio || 1;
      const pad = Math.round(40 * dpr);
      minX = Math.max(0, minX - pad);
      minY = Math.max(0, minY - pad);
      maxX = Math.min(w - 1, maxX + pad);
      maxY = Math.min(h - 1, maxY + pad);

      const cropW = maxX - minX + 1;
      const cropH = maxY - minY + 1;

      const cropCanvas = document.createElement("canvas");
      cropCanvas.width = cropW;
      cropCanvas.height = cropH;
      const cropCtx = cropCanvas.getContext("2d");
      // Fill white background
      cropCtx.fillStyle = "#ffffff";
      cropCtx.fillRect(0, 0, cropW, cropH);
      // Draw the cropped region from raw pixel buffer
      cropCtx.drawImage(canvas, minX, minY, cropW, cropH, 0, 0, cropW, cropH);

      return cropCanvas;
    }

    // Preprocess the canvas image for better OCR recognition:
    // 1. Binarize (pure black/white, remove anti-aliasing)
    // 2. Dilate (thicken strokes so Tesseract sees them clearly)
    // 3. Scale up to a minimum height (Tesseract needs ~50-70px tall chars)
    function preprocessForOCR(sourceCanvas) {
      const sw = sourceCanvas.width;
      const sh = sourceCanvas.height;
      const srcCtx = sourceCanvas.getContext("2d");
      const srcData = srcCtx.getImageData(0, 0, sw, sh);
      const src = srcData.data;

      // --- Step 1: Binarize ---
      // Convert to pure black (0) or white (255) using Otsu-like threshold
      const gray = new Uint8Array(sw * sh);
      for (let i = 0; i < sw * sh; i++) {
        const r = src[i * 4], g = src[i * 4 + 1], b = src[i * 4 + 2];
        gray[i] = Math.round(0.299 * r + 0.587 * g + 0.114 * b);
      }

      // Simple threshold (works well for dark-on-white canvas drawing)
      const threshold = 180;
      const binary = new Uint8Array(sw * sh);
      for (let i = 0; i < sw * sh; i++) {
        binary[i] = gray[i] < threshold ? 0 : 255; // 0 = ink, 255 = background
      }

      // --- Step 2: Dilate (thicken strokes) ---
      // 3x3 dilation: if any neighbor is ink (0), pixel becomes ink
      const dilated = new Uint8Array(sw * sh);
      dilated.set(binary);
      for (let pass = 0; pass < 2; pass++) { // 2 passes for stronger dilation
        const input = pass === 0 ? binary : dilated.slice();
        for (let y = 1; y < sh - 1; y++) {
          for (let x = 1; x < sw - 1; x++) {
            const idx = y * sw + x;
            if (input[idx] === 0) {
              dilated[idx] = 0;
              continue;
            }
            // Check 3x3 neighborhood
            let isNearInk = false;
            for (let dy = -1; dy <= 1 && !isNearInk; dy++) {
              for (let dx = -1; dx <= 1 && !isNearInk; dx++) {
                if (input[(y + dy) * sw + (x + dx)] === 0) {
                  isNearInk = true;
                }
              }
            }
            dilated[idx] = isNearInk ? 0 : 255;
          }
        }
      }

      // --- Step 3: Scale up to minimum height ---
      // Tesseract works best with characters ~50-70px tall.
      // Target: at least 120px canvas height for reliable single-word OCR.
      const minHeight = 140;
      const scale = sh < minHeight ? minHeight / sh : 1;
      const dw = Math.round(sw * scale);
      const dh = Math.round(sh * scale);

      // Write binarized+dilated result back to a canvas
      const binCanvas = document.createElement("canvas");
      binCanvas.width = sw;
      binCanvas.height = sh;
      const binCtx = binCanvas.getContext("2d");
      const outData = binCtx.createImageData(sw, sh);
      for (let i = 0; i < sw * sh; i++) {
        const v = dilated[i];
        outData.data[i * 4] = v;
        outData.data[i * 4 + 1] = v;
        outData.data[i * 4 + 2] = v;
        outData.data[i * 4 + 3] = 255;
      }
      binCtx.putImageData(outData, 0, 0);

      // Scale up if needed
      if (scale > 1) {
        const scaledCanvas = document.createElement("canvas");
        scaledCanvas.width = dw;
        scaledCanvas.height = dh;
        const scaledCtx = scaledCanvas.getContext("2d");
        // Use pixelated rendering to keep sharp edges
        scaledCtx.imageSmoothingEnabled = false;
        scaledCtx.drawImage(binCanvas, 0, 0, dw, dh);
        return scaledCanvas;
      }

      return binCanvas;
    }

    // Normalize text: lowercase, keep only letters (including Polish diacritics)
    function normalizeText(text) {
      return text.trim().toLowerCase().replace(/[^a-ząćęłńóśźż]/g, "");
    }

    async function recognizeText() {
      if (!worker) return "";
      // Crop to just the drawn region
      const cropped = getCroppedCanvas();
      if (!cropped) return "";
      // Apply binarization, dilation, and upscaling
      const processed = preprocessForOCR(cropped);
      const dataUrl = processed.toDataURL("image/png");
      const result = await worker.recognize(dataUrl);
      return normalizeText(result.data.text);
    }

    // Levenshtein distance for fuzzy matching
    function levenshtein(a, b) {
      const m = a.length, n = b.length;
      const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
      for (let i = 0; i <= m; i++) dp[i][0] = i;
      for (let j = 0; j <= n; j++) dp[0][j] = j;
      for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
          dp[i][j] = Math.min(
            dp[i - 1][j] + 1,
            dp[i][j - 1] + 1,
            dp[i - 1][j - 1] + (a[i - 1] !== b[j - 1] ? 1 : 0)
          );
        }
      }
      return dp[m][n];
    }

    // =========================================================================
    // VOCABULARY TRAINER LOGIC
    // =========================================================================
    let currentVocab = null;
    let isChecking = false;
    let isShowingResult = false;
    let lastCheckResult = null; // stores the result until user rates

    const promptCard = document.getElementById("promptCard");
    const promptLabel = document.getElementById("promptLabel");
    const promptWord = document.getElementById("promptWord");
    const resultInfo = document.getElementById("resultInfo");
    const ocrResult = document.getElementById("ocrResult");
    const correctAnswer = document.getElementById("correctAnswer");
    const btnCheck = document.getElementById("btnCheck");
    const btnShowAnswer = document.getElementById("btnShowAnswer");
    const btnClear = document.getElementById("btnClear");
    const bottomActions = document.getElementById("bottomActions");
    const nextActions = document.getElementById("nextActions");

    function pickNextVocab() {
      const pool = currentBatch.length > 0 ? currentBatch : VOCABULARY;
      const stats = loadStats();
      const now = Date.now();
      // Weight selection: prioritize due items, less practiced, and more wrong answers
      const weighted = pool.map(v => {
        const s = stats[v.id];
        if (!s) return { vocab: v, weight: 10 }; // Never seen = high priority
        const wrongRate = s.attempts > 0 ? s.wrong / s.attempts : 0;
        // If dueAt exists, use it for scheduling; items past due get higher weight
        const overdue = s.dueAt ? Math.max(0, (now - s.dueAt) / (1000 * 60)) : 10; // minutes overdue
        const notYetDue = s.dueAt && s.dueAt > now;
        // Higher weight = more likely to be picked
        let weight;
        if (notYetDue) {
          weight = 0.1; // Very low weight for items not yet due
        } else {
          weight = Math.max(1, (wrongRate * 5) + Math.min(overdue / 10, 10) - (s.correct * 0.5));
        }
        return { vocab: v, weight };
      });

      // Don't repeat the same word
      const candidates = weighted.filter(w => !currentVocab || w.vocab.id !== currentVocab.id);
      // Weighted random selection
      const totalWeight = candidates.reduce((sum, c) => sum + c.weight, 0);
      let rand = Math.random() * totalWeight;
      for (const c of candidates) {
        rand -= c.weight;
        if (rand <= 0) return c.vocab;
      }
      return candidates[candidates.length - 1].vocab;
    }

    function showVocab(vocab) {
      currentVocab = vocab;
      isShowingResult = false;

      promptCard.className = "prompt-bar";
      updateFilePickerLabel();
      promptWord.textContent = vocab.prompt;
      resultInfo.className = "result-info";
      updateBatchIndicator();
      updateProgressRing();

      // Show skip button only when not showing result
      document.getElementById("btnSkipWord").style.display = "flex";

      bottomActions.style.display = "flex";
      nextActions.style.display = "none";
      btnCheck.disabled = false;
      btnCheck.innerHTML = "CHECK";

      clearCanvas();
    }

    async function checkAnswer() {
      if (isChecking || isShowingResult || !hasDrawn) return;
      isChecking = true;
      btnCheck.disabled = true;
      btnCheck.innerHTML = '<div class="spinner"></div>';

      try {
        const recognized = await recognizeText();
        const expected = normalizeText(currentVocab.answer);
        // Fuzzy match: scale tolerance with word length
        // 1-3 chars: exact match, 4-6 chars: 1 error, 7+ chars: 2 errors
        const dist = levenshtein(recognized, expected);
        const threshold = expected.length >= 7 ? 2 : expected.length >= 4 ? 1 : 0;
        const isCorrect = recognized.length > 0 && dist <= threshold;

        // Show result
        ocrResult.textContent = recognized || "(nothing)";
        ocrResult.className = "ocr-text " + (isCorrect ? "" : "wrong-answer");
        correctAnswer.textContent = currentVocab.answerDisplay;

        resultInfo.className = "result-info visible";

        promptCard.className = "prompt-bar " + (isCorrect ? "result-correct" : "result-wrong");

        // Store result - recording deferred to rating button click
        lastCheckResult = { vocabId: currentVocab.id, isCorrect };

        // Switch to rating mode
        bottomActions.style.display = "none";
        nextActions.style.display = "flex";
        document.getElementById("btnSkipWord").style.display = "none";
        isShowingResult = true;
      } catch (err) {
        console.error("OCR error:", err);
        btnCheck.innerHTML = "CHECK";
        btnCheck.disabled = false;
      }

      isChecking = false;
    }

    function showAnswer() {
      if (isShowingResult) return;
      correctAnswer.textContent = currentVocab.answerDisplay;
      ocrResult.textContent = "(peeked)";
      ocrResult.className = "ocr-text wrong-answer";
      resultInfo.className = "result-info visible";
      promptCard.className = "prompt-bar result-wrong";

      // Store result - recording deferred to rating button click
      lastCheckResult = { vocabId: currentVocab.id, isCorrect: false };

      bottomActions.style.display = "none";
      nextActions.style.display = "flex";
      document.getElementById("btnSkipWord").style.display = "none";
      isShowingResult = true;
    }

    function nextWord(rating) {
      // Record the attempt with the chosen rating
      if (lastCheckResult) {
        recordAttempt(lastCheckResult.vocabId, rating);
        lastCheckResult = null;
      }
      const vocab = pickNextVocab();
      showVocab(vocab);
    }

    // Event listeners
    btnCheck.addEventListener("click", checkAnswer);
    btnClear.addEventListener("click", () => {
      if (!isShowingResult) clearCanvas();
    });
    btnShowAnswer.addEventListener("click", showAnswer);

    // Skip current word: replace it in the batch and show next
    document.getElementById("btnSkipWord").addEventListener("click", () => {
      if (isChecking) return;
      if (currentVocab) {
        skipWordInBatch(currentVocab.id);
      }
      lastCheckResult = null;
      const vocab = pickNextVocab();
      showVocab(vocab);
    });

    // Rating button listeners
    nextActions.querySelectorAll(".btn-rating").forEach(btn => {
      btn.addEventListener("click", () => {
        const rating = btn.dataset.rating;
        nextWord(rating);
      });
    });

    // =========================================================================
    // STATS MODAL
    // =========================================================================
    const statsModal = document.getElementById("statsModal");
    const statsBody = document.getElementById("statsBody");
    const btnStats = document.getElementById("btnStats");
    const btnCloseStats = document.getElementById("btnCloseStats");

    function renderStats() {
      const stats = loadStats();
      const batchSize = getBatchSize();
      let totalAttempts = 0;
      let totalAgain = 0;
      let totalHard = 0;
      let totalGood = 0;
      let totalEasy = 0;

      currentBatch.forEach(v => {
        const s = stats[v.id];
        if (s) {
          totalAttempts += s.attempts;
          totalAgain += s.again || 0;
          totalHard += s.hard || 0;
          totalGood += s.good || 0;
          totalEasy += s.easy || 0;
        }
      });

      let html = `
        <div class="progress-overview">
          <h3>Overall Progress</h3>
          ${renderProgressOverview()}
        </div>

        <div class="settings-section">
          <h3>Batch Settings</h3>
          <div class="setting-row">
            <label for="batchSizeInput">Words per batch</label>
            <input type="number" id="batchSizeInput" min="1" max="${VOCABULARY.length}" value="${batchSize}">
          </div>
          <button class="btn-skip-batch" id="btnSkipBatch">Skip Batch (get new words)</button>
          <div class="batch-toggle" id="batchToggle">
            <span>View Current Batch (${currentBatch.length} words)</span>
            <svg class="toggle-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div class="batch-word-list" id="batchWordList">
      `;

      currentBatch.forEach(v => {
        html += `
            <div class="batch-word-item">
              <div>
                <span class="bw-prompt">${v.prompt}</span>
                <span class="bw-answer"> — ${v.answerDisplay}</span>
              </div>
            </div>
        `;
      });

      html += `
          </div>
        </div>

        <h3 style="font-size:14px; font-weight:700; margin-bottom:10px;">Batch Statistics</h3>
        <div class="stats-summary" style="grid-template-columns: 1fr 1fr 1fr 1fr 1fr;">
          <div class="stat-box">
            <div class="number">${totalAttempts}</div>
            <div class="label">Total</div>
          </div>
          <div class="stat-box">
            <div class="number" style="color:#ef4444;">${totalAgain}</div>
            <div class="label">Again</div>
          </div>
          <div class="stat-box">
            <div class="number" style="color:#f59e0b;">${totalHard}</div>
            <div class="label">Hard</div>
          </div>
          <div class="stat-box">
            <div class="number" style="color:#22c55e;">${totalGood}</div>
            <div class="label">Good</div>
          </div>
          <div class="stat-box">
            <div class="number" style="color:#3b82f6;">${totalEasy}</div>
            <div class="label">Easy</div>
          </div>
        </div>
        <div class="vocab-stats-list">
      `;

      currentBatch.forEach(v => {
        const s = stats[v.id];
        const attempts = s ? s.attempts : 0;
        const again = s ? (s.again || 0) : 0;
        const hard = s ? (s.hard || 0) : 0;
        const good = s ? (s.good || 0) : 0;
        const easy = s ? (s.easy || 0) : 0;
        html += `
          <div class="vocab-stat-item">
            <div>
              <div class="word">${v.prompt}</div>
              <div class="translation">${v.answerDisplay}</div>
            </div>
            <div class="ratio">
              <span style="color:#ef4444;">${again}</span> /
              <span style="color:#f59e0b;">${hard}</span> /
              <span style="color:#22c55e;">${good}</span> /
              <span style="color:#3b82f6;">${easy}</span>
              <span style="color:var(--text-muted); font-weight:400;">(${attempts})</span>
            </div>
          </div>
        `;
      });

      html += `</div>
        <div class="data-section">
          <h3>Data Management</h3>
          <div class="data-btn-row">
            <button class="btn-export" id="btnExportStats">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Export Backup
            </button>
            <button class="btn-import" id="btnImportStats">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              Import Backup
            </button>
          </div>
          <input type="file" id="importFileInput" accept=".json" style="display:none;">
          <div class="import-status" id="importStatus"></div>
        </div>
        <button class="btn-clear-stats" id="btnClearStats">Reset All Statistics</button>
      `;
      statsBody.innerHTML = html;

      // Batch size input handler
      document.getElementById("batchSizeInput").addEventListener("change", (e) => {
        const newSize = setBatchSize(parseInt(e.target.value) || DEFAULT_BATCH_SIZE);
        e.target.value = newSize;
      });

      // Skip batch button handler
      document.getElementById("btnSkipBatch").addEventListener("click", () => {
        skipCurrentBatch();
        statsModal.classList.remove("open");
      });

      // Batch word list toggle
      document.getElementById("batchToggle").addEventListener("click", () => {
        const toggle = document.getElementById("batchToggle");
        const list = document.getElementById("batchWordList");
        toggle.classList.toggle("open");
        list.classList.toggle("open");
      });

      document.getElementById("btnClearStats").addEventListener("click", () => {
        if (confirm("Are you sure you want to reset all statistics?")) {
          clearStats();
          renderStats();
        }
      });

      // Export stats handler
      document.getElementById("btnExportStats").addEventListener("click", () => {
        exportStats();
      });

      // Import stats handler
      const importFileInput = document.getElementById("importFileInput");
      const importStatus = document.getElementById("importStatus");

      document.getElementById("btnImportStats").addEventListener("click", () => {
        importFileInput.click();
      });

      importFileInput.addEventListener("change", async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // Ask whether to merge or replace
        const doReplace = confirm(
          "Import mode:\n\n" +
          "OK = Replace all stats with backup\n" +
          "Cancel = Merge (keep best stats per word)"
        );
        const mode = doReplace ? "replace" : "merge";

        try {
          const wordCount = await importStats(file, mode);
          importStatus.className = "import-status success";
          importStatus.textContent = `Imported ${wordCount} word stats (${mode} mode). Refreshing...`;
          // Refresh the stats modal after a short delay
          setTimeout(() => {
            renderStats();
          }, 1500);
        } catch (err) {
          importStatus.className = "import-status error";
          importStatus.textContent = typeof err === "string" ? err : "Import failed.";
        }

        // Reset file input so same file can be re-imported
        importFileInput.value = "";
      });
    }

    btnStats.addEventListener("click", () => {
      renderStats();
      statsModal.classList.add("open");
    });

    btnCloseStats.addEventListener("click", () => {
      statsModal.classList.remove("open");
    });

    statsModal.addEventListener("click", (e) => {
      if (e.target === statsModal) {
        statsModal.classList.remove("open");
      }
    });

    // =========================================================================
    // FILE PICKER
    // =========================================================================
    const filePickerOverlay = document.getElementById("filePickerOverlay");
    const filePickerList = document.getElementById("filePickerList");
    const vocabFileInput = document.getElementById("vocabFileInput");

    function openFilePicker() {
      renderFilePickerList();
      filePickerOverlay.classList.add("open");
    }

    function closeFilePicker() {
      filePickerOverlay.classList.remove("open");
    }

    function renderFilePickerList() {
      const files = getFileRegistry();
      let html = '';
      for (const f of files) {
        const isActive = f.slug === activeFileSlug;
        html += `
          <div class="file-picker-item ${isActive ? 'active' : ''}" data-slug="${f.slug}">
            <span class="fp-name">${f.name}</span>
            ${files.length > 1 ? `<button class="fp-delete" data-delete-slug="${f.slug}" title="Delete this file">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M5 6l1 14h12l1-14"/></svg>
            </button>` : ''}
          </div>
        `;
      }
      filePickerList.innerHTML = html;

      // Click handlers for file items
      filePickerList.querySelectorAll('.file-picker-item').forEach(item => {
        item.addEventListener('click', async (e) => {
          // Don't switch if clicking the delete button
          if (e.target.closest('.fp-delete')) return;
          const slug = item.dataset.slug;
          if (slug === activeFileSlug) {
            closeFilePicker();
            return;
          }
          closeFilePicker();
          await switchVocabFile(slug);
        });
      });

      // Delete handlers
      filePickerList.querySelectorAll('.fp-delete').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const slug = btn.dataset.deleteSlug;
          const files = getFileRegistry();
          const file = files.find(f => f.slug === slug);
          if (!confirm(`Delete "${file ? file.name : slug}" and its statistics?`)) return;

          // Delete from IndexedDB and registry
          await deleteVocabFile(slug);
          // Also remove per-file stats/batch from localStorage
          localStorage.removeItem('anki_scribe_stats_' + slug);
          localStorage.removeItem('anki_scribe_batch_' + slug);
          localStorage.removeItem('anki_scribe_batch_size_' + slug);

          // If we deleted the active file, switch to another
          if (slug === activeFileSlug) {
            const remaining = getFileRegistry();
            if (remaining.length > 0) {
              await switchVocabFile(remaining[0].slug);
            }
          }
          renderFilePickerList();
        });
      });
    }

    // Open picker when clicking the prompt label
    document.getElementById('promptLabel').addEventListener('click', () => {
      openFilePicker();
    });

    // Close picker when clicking overlay background
    filePickerOverlay.addEventListener('click', (e) => {
      if (e.target === filePickerOverlay) {
        closeFilePicker();
      }
    });

    // Import new vocab file
    document.getElementById('filePickerImportBtn').addEventListener('click', () => {
      vocabFileInput.click();
    });

    vocabFileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      try {
        const text = await file.text();
        const slug = slugify(file.name);
        const displayName = file.name.replace(/\.[^.]+$/, '');

        // Check if slug already exists
        const existing = getFileRegistry().find(f => f.slug === slug);
        if (existing) {
          if (!confirm(`A file "${existing.name}" already exists. Overwrite it?`)) {
            vocabFileInput.value = '';
            return;
          }
        }

        // Validate: try parsing to ensure it has vocab entries
        const vocab = parseVocabularyText(text);
        if (vocab.length === 0) {
          alert('No vocabulary entries found in this file.\nExpected format: English[TAB]Translation (one per line).');
          vocabFileInput.value = '';
          return;
        }

        await storeVocabFile(slug, displayName, text);
        closeFilePicker();
        await switchVocabFile(slug);
      } catch (err) {
        console.error('Failed to import vocab file:', err);
        alert('Failed to import file: ' + err.message);
      }

      vocabFileInput.value = '';
    });

    // =========================================================================
    // INIT
    // =========================================================================
    async function init() {
      resizeCanvas();

      // Determine which vocab file to load
      const savedSlug = getActiveFileSlug();
      let vocabLoaded = false;

      if (savedSlug) {
        // Try loading the previously active file from IndexedDB
        const result = await loadVocabularyForSlug(savedSlug);
        if (result) {
          VOCABULARY = result.vocab;
          activeFileSlug = savedSlug;
          vocabLoaded = true;
        }
      }

      if (!vocabLoaded) {
        // First run or missing file: fetch default, store in IndexedDB
        try {
          const result = await fetchAndStoreDefaultVocab();
          VOCABULARY = result.vocab;
          activeFileSlug = result.slug;
          // Migrate any legacy stats from before multi-file support
          migrateLegacyStats(result.slug);
        } catch (err) {
          console.error('Failed to load default vocabulary:', err);
          VOCABULARY = [];
        }
      }

      setActiveFileSlug(activeFileSlug);

      // Init OCR in parallel (vocab is already loaded above)
      await initOCR();

      resolveBatch();
      updateFilePickerLabel();
      const vocab = pickNextVocab();
      if (vocab) showVocab(vocab);
    }

    init();

    // =========================================================================
    // SERVICE WORKER REGISTRATION
    // =========================================================================
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => {
            console.log('SW registered, scope:', reg.scope);
          })
          .catch(err => {
            console.log('SW registration failed:', err);
          });
      });
    }
  </script>


</body></html>
